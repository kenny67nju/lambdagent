name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip "setuptools>=77" wheel
          pip install -e ".[dev]"

      - name: pytest
        run: pytest tests/ -q --tb=short

      - name: build sdist + wheel
        run: |
          pip install build
          python -m build
          ls -la dist/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff
      - run: ruff check . --select=E9,F63,F7,F82 --statistics
        # Only fatal categories on CI: syntax errors (E9), undefined names (F82),
        # invalid prints/types in tests (F63, F7). The full lint pass should
        # be local-only until the existing codebase is cleaned up.
