name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node.js 24 before GitHub forces it on 2026-06-16.
# Once `actions/checkout` and `actions/setup-python` ship Node 24 builds
# by default this env can be dropped.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: test (${{ matrix.os }} · py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        # Use bash on every platform so multi-line '\' continuations and
        # POSIX-style quoting work uniformly. Git-for-Windows ships bash
        # on the Windows runner image.
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip "setuptools>=77" wheel
          pip install -e ".[dev]"

      - name: pytest with coverage
        run: |
          pytest tests/ -q --tb=short \
            --cov=lambdagent \
            --cov-report=xml \
            --cov-report=term-missing:skip-covered

      - name: Upload coverage to Codecov
        # Only upload from one OS × one Python combo to avoid double-counting.
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false   # missing CODECOV_TOKEN should not block CI
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: build sdist + wheel
        # Only build on one combo — saves ~30s per matrix slot.
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          pip install build
          python -m build
          ls -la dist/

  lint:
    name: lint (fatal-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install ruff
      - run: ruff check . --select=E9,F63,F7,F82 --statistics
        # Fatal-only categories: syntax errors (E9), undefined names (F82),
        # invalid prints/types (F63, F7). Broader lint is informational below.

  format-check:
    name: format check (informational)
    runs-on: ubuntu-latest
    # Informational only: existing codebase has not been formatted with ruff
    # format. Will fail loudly until a one-time `ruff format .` lands.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install ruff
      - run: ruff format --check --diff .
