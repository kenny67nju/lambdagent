name: Feature request
description: Propose a new construct, API, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the use case?
      description: What are you trying to accomplish that's currently hard or impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: API sketch, YAML schema, or Lambda-calculus mapping if applicable
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: paper
    attributes:
      label: Theoretical grounding
      options:
        - label: This maps to a known concept in λ-calculus / π-calculus / type theory (please cite in the proposal)
        - label: This is a pure engineering improvement (no theory required)
