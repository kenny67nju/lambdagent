name: Bug report
description: Something works incorrectly or unexpectedly
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Concise description of the unexpected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Smallest Python snippet or YAML config that triggers the issue
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: lambdagent version + Python version + OS
      placeholder: "0.1.0, Python 3.11.5, macOS 14.5"
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Full traceback (if any)
      render: shell
